version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LATTICE_DB_PATH=/data/lattice.db
    volumes:
      - lattice-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lattice-data:
